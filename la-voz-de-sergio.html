<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La voz de Sergio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --red: #FF0000;
    --red-dim: rgba(255,0,0,0.15);
    --red-glow: rgba(255,0,0,0.08);
    --text: #f5f5f5;
    --muted: #666;
    --r: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 1rem 4rem;
  }

  /* Top bar con logo */
  .topbar {
    width: 100%;
    background: #000;
    border-bottom: 2px solid var(--red);
    padding: 0.7rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .topbar img {
    height: 42px;
    object-fit: contain;
  }

  .container { width: 100%; max-width: 700px; }

  /* Título */
  header { text-align: center; margin-bottom: 2rem; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 9vw, 4.5rem);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
  }
  header h1 span { color: var(--red); }
  header p {
    margin-top: 0.5rem;
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 0.03em;
  }

  /* Textarea */
  .write-zone {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .write-zone:focus-within {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--red-glow), 0 0 20px var(--red-glow);
  }
  #texto {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(1.2rem, 3.5vw, 1.6rem);
    font-weight: 400; line-height: 1.6;
    resize: none; min-height: 150px;
    caret-color: var(--red);
  }
  #texto::placeholder { color: #333; font-style: italic; }
  .char-count { text-align: right; color: var(--muted); font-size: 0.75rem; margin-top: 0.4rem; }

  /* Botón principal */
  #btn-hablar {
    width: 100%;
    padding: 1.1rem;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--r);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 0.7rem;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    margin-bottom: 1rem;
  }
  #btn-hablar:hover:not(:disabled) {
    background: #e00;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,0,0,0.35);
  }
  #btn-hablar:active:not(:disabled) { transform: translateY(0); }
  #btn-hablar:disabled { opacity: 0.4; cursor: not-allowed; }
  #btn-hablar.hablando {
    background: #222;
    border: 2px solid var(--red);
    color: var(--red);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,0,0,0.4); }
    50%      { box-shadow: 0 0 0 10px rgba(255,0,0,0); }
  }

  /* Controles */
  .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .ctrl {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 0.8rem 1rem;
    flex: 1; min-width: 160px;
  }
  .ctrl label {
    display: block; font-size: 0.68rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.5rem;
  }
  .slider-row { display: flex; align-items: center; gap: 0.5rem; }
  input[type=range] {
    flex: 1; -webkit-appearance: none;
    height: 3px; background: var(--border); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: var(--red); border-radius: 50%; cursor: pointer;
  }
  .sv { font-size: 0.8rem; color: var(--red); min-width: 28px; text-align: right; }
  select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    padding: 0.3rem 0.5rem; width: 100%; outline: none; cursor: pointer;
  }

  /* Frases rápidas */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.8rem;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 0.08em; color: var(--muted);
  }
  #btn-agregar {
    background: transparent; border: 1px solid var(--border);
    color: var(--red); border-radius: 8px;
    padding: 0.3rem 0.8rem; font-size: 0.8rem;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: background 0.15s, border-color 0.15s;
  }
  #btn-agregar:hover { background: var(--red-dim); border-color: var(--red); }

  .frases-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 0.5rem;
  }
  .frase-btn {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    padding: 0.7rem 0.9rem; cursor: pointer; text-align: left;
    transition: border-color 0.15s, transform 0.1s, background 0.15s;
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 0.4rem; line-height: 1.3; word-break: break-word;
  }
  .frase-btn:hover { border-color: var(--red); background: var(--surface2); transform: translateY(-1px); }
  .frase-del {
    color: var(--muted); font-size: 0.7rem; opacity: 0;
    transition: opacity 0.15s; flex-shrink: 0;
    padding: 2px 4px; border-radius: 4px;
  }
  .frase-btn:hover .frase-del { opacity: 1; }
  .frase-del:hover { color: var(--red) !important; background: var(--red-dim); }

  /* Status */
  #status {
    text-align: center; font-size: 0.8rem; color: var(--muted);
    margin-top: 1.5rem; min-height: 1.2em;
  }
  #status.ok  { color: #4CAF50; }
  #status.err { color: var(--red); }
  #status.info { color: #aaa; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 1rem;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--surface2); border: 1.5px solid var(--red);
    border-radius: var(--r); padding: 1.5rem;
    width: 100%; max-width: 420px;
    box-shadow: 0 0 40px rgba(255,0,0,0.15);
  }
  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 0.05em;
    margin-bottom: 1rem; color: var(--text);
  }
  .modal input {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 1rem;
    padding: 0.75rem 1rem; outline: none; margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .modal input:focus { border-color: var(--red); }
  .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
  .btn-cancel {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 0.6rem 1.2rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
  }
  .btn-save {
    background: var(--red); border: none; color: #fff;
    border-radius: 10px; padding: 0.6rem 1.4rem; cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
    letter-spacing: 0.05em;
  }
  .btn-save:hover { background: #e00; }

  footer {
    margin-top: 3rem; text-align: center;
    font-size: 0.72rem; color: #2a2a2a;
  }

  @media (max-width: 480px) {
    .controls { flex-direction: column; }
    .frases-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

</div>

<script>
const STORAGE_KEY = 'sergio_frases';
const frasesDefault = [
  "Hola, ¿cómo estás?","Gracias.","Por favor.","Necesito ayuda.",
  "Sí.","No.","Un momento, por favor.",
  "No entiendo. ¿Podés repetir?","¿Cuánto cuesta?",
  "Tengo hambre.","Tengo sed.","Necesito ir al baño."
];
let frases = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || frasesDefault;
let synth = window.speechSynthesis;
let voces = [];
let hablando = false;

function cargarVoces() {
  voces = synth.getVoices().filter(v => v.lang.startsWith('es'));
  if (!voces.length) voces = synth.getVoices();
  const sel = document.getElementById('voces');
  if (!voces.length) { sel.innerHTML = '<option>Sin voces instaladas</option>'; return; }
  sel.innerHTML = '';
  voces.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = v.name.replace(/Microsoft|Google|Apple/g,'').trim() + ` [${v.lang}]`;
    sel.appendChild(opt);
  });
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = cargarVoces;
cargarVoces();

function hablar(textoForzado) {
  const texto = textoForzado || document.getElementById('texto').value.trim();
  if (!texto) { setStatus('Escribí algo primero.', 'err'); return; }
  if (hablando) { synth.cancel(); setHablando(false); return; }
  const utt = new SpeechSynthesisUtterance(texto);
  const idx = document.getElementById('voces').value;
  if (voces[idx]) utt.voice = voces[idx];
  utt.rate  = parseFloat(document.getElementById('velocidad').value);
  utt.pitch = parseFloat(document.getElementById('tono').value);
  utt.lang  = 'es-AR';
  utt.onstart = () => setHablando(true);
  utt.onend   = () => setHablando(false);
  utt.onerror = () => { setHablando(false); setStatus('La voz del sistema no está disponible.', 'err'); };
  synth.speak(utt);
}

function setHablando(v) {
  hablando = v;
  const btn = document.getElementById('btn-hablar');
  const lbl = document.getElementById('btn-label');
  btn.classList.toggle('hablando', v);
  lbl.textContent = v ? '⏹ DETENER' : 'HABLAR';
  if (!v) setStatus('Listo', '');
  else    setStatus('Hablando…', 'ok');
}

function setStatus(msg, cls) {
  const s = document.getElementById('status');
  s.textContent = msg; s.className = cls || '';
}

function updateSlider(id, valId) {
  document.getElementById(valId).textContent = parseFloat(document.getElementById(id).value).toFixed(1);
}

document.getElementById('texto').addEventListener('input', () => {
  document.getElementById('chars').textContent = document.getElementById('texto').value.length;
});
document.getElementById('texto').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') hablar();
});

function renderFrases() {
  const grid = document.getElementById('frases-grid');
  grid.innerHTML = '';
  frases.forEach((f, i) => {
    const btn = document.createElement('button');
    btn.className = 'frase-btn';
    btn.innerHTML = `<span>${f}</span><span class="frase-del" title="Eliminar" onclick="eliminarFrase(event,${i})">✕</span>`;
    btn.addEventListener('click', () => {
      document.getElementById('texto').value = f;
      document.getElementById('chars').textContent = f.length;
      hablar(f);
    });
    grid.appendChild(btn);
  });
}

function eliminarFrase(e, i) {
  e.stopPropagation();
  frases.splice(i, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(frases));
  renderFrases();
}

function abrirModal() {
  document.getElementById('nueva-frase').value = '';
  document.getElementById('modal').classList.add('visible');
  setTimeout(() => document.getElementById('nueva-frase').focus(), 100);
}
function cerrarModal() { document.getElementById('modal').classList.remove('visible'); }
function guardarFrase() {
  const val = document.getElementById('nueva-frase').value.trim();
  if (!val) return;
  frases.push(val);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(frases));
  renderFrases();
  cerrarModal();
}
document.getElementById('nueva-frase').addEventListener('keydown', e => {
  if (e.key === 'Enter') guardarFrase();
  if (e.key === 'Escape') cerrarModal();
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) cerrarModal();
});

renderFrases();
</script>
</body>
</html>
